<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OZ SPACE - 영상 생성 모듈</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* 모바일 네이티브 스크롤 숨김 및 스냅 */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    body {
      background-color: #000;
      color: #fff;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
    }
  </style>
</head>
<body class="font-sans antialiased text-white">
  <!-- 부모 앱에서 띄우는 웹뷰/모달 레이아웃을 가정 -->
  <div id="root" class="w-full max-w-md mx-auto h-[100dvh] bg-[#09090b] relative overflow-hidden flex flex-col shadow-2xl"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const DUMMY_IMG = "https://lh3.googleusercontent.com/d/1M_DVMkQECsQ6jV-f86hyBuSnLU56rD22";

    // --- Lucide 아이콘 래퍼 ---
    const IconWrapper = ({ name, size = 24, className = '', fill = 'none' }) => {
      const containerRef = useRef(null);
      useEffect(() => {
        if (containerRef.current) {
          containerRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
          lucide.createIcons({ root: containerRef.current });
          const svg = containerRef.current.querySelector('svg');
          if (svg) {
             svg.style.width = typeof size === 'number' ? `${size}px` : size;
             svg.style.height = typeof size === 'number' ? `${size}px` : size;
             if (className) svg.setAttribute('class', `lucide lucide-${name} ${className}`);
             if (fill === 'currentColor') svg.classList.add('fill-current');
          }
        }
      }, [name, size, className, fill]);
      return <span ref={containerRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}></span>;
    };

    // 모듈에서 사용하는 필수 아이콘만 남김
    const Plus = (p) => <IconWrapper name="plus" {...p} />;
    const Play = (p) => <IconWrapper name="play" {...p} />;
    const Sparkles = (p) => <IconWrapper name="sparkles" {...p} />;
    const ChevronLeft = (p) => <IconWrapper name="chevron-left" {...p} />;
    const Loader2 = (p) => <IconWrapper name="loader-2" {...p} />;
    const Wand2 = (p) => <IconWrapper name="wand-2" {...p} />;


    // --- 핵심 모듈: 영상 생성 에디터 뷰 ---
    // 외부(부모 앱)에서 props로 onBack(닫기), onComplete(완료 후 보관함 이동 등)를 주입받아 사용합니다.
    const EditorModule = ({ onBack, onComplete }) => {
      // 입력 단계 상태
      const [scenario, setScenario] = useState('');
      const [t2vPrompt, setT2vPrompt] = useState('');
      
      // 흐름 제어 상태: input -> analyzing(프롬프트 분석) -> generating(영상 렌더링) -> result(결과/바이브) -> saving(내보내기)
      const [phase, setPhase] = useState('input');
      const [optimizedPrompt, setOptimizedPrompt] = useState('');
      
      // 바이브(필터/스타일) 상태
      const [currentVibe, setCurrentVibe] = useState('');
      const [selectedVibe, setSelectedVibe] = useState(''); 
      const vibes = ['🔥 마라맛 액션', '✨ 몽환적 감성', '🤡 B급 밈', '🎬 사이버펑크'];

      // 트렌드 무작위 프롬프트 더미 데이터
      const TRENDING_PROMPTS = [
        "사이버펑크 네온사인 거리에서 화려하게 춤추는 고양이",
        "우주 정거장 창문 너머로 보이는 경이로운 지구의 일출",
        "중세 판타지 마을의 평화로운 아침 장터 풍경",
        "초고속 카메라로 촬영한 물방울이 터지는 환상적인 순간"
      ];

      // 생성 시작 (가챠 굴리기)
      const handleStartGeneration = () => {
        setPhase('analyzing');
        
        setTimeout(() => {
          let finalPrompt = '';
          if (scenario.trim()) {
            finalPrompt = `[최적화됨] ${scenario}`;
          } else if (t2vPrompt.trim()) {
            finalPrompt = `[이미지 분석됨] ${t2vPrompt}의 특징을 살린 트렌디한 영상`;
          } else {
            finalPrompt = `[트렌드 반영] ${TRENDING_PROMPTS[Math.floor(Math.random() * TRENDING_PROMPTS.length)]}`;
          }
          
          setOptimizedPrompt(finalPrompt);
          setPhase('generating');
          
          setTimeout(() => {
            setPhase('result');
          }, 2500);
        }, 1500);
      };

      // 바이브(스타일) 느낌 적용해서 다시 생성
      const handleApplyVibe = () => {
        if (!selectedVibe) return;
        
        setCurrentVibe(selectedVibe);
        setPhase('generating');
        
        setTimeout(() => {
          setOptimizedPrompt(`${selectedVibe} 스타일이 진하게 적용된: ${optimizedPrompt}`);
          setPhase('result');
          setSelectedVibe(''); 
        }, 2000);
      };

      // 최종 결과물 내보내기 (부모 앱으로 데이터 전달)
      const handleExport = () => {
        setPhase('saving'); 
        setTimeout(() => {
          // 생성된 영상 데이터(URL, 프롬프트 등)를 묶어서 부모에게 전달하는 로직이 들어갈 곳
          const generatedData = { prompt: optimizedPrompt, vibe: currentVibe };
          onComplete(generatedData);
        }, 800);
      };

      return (
        <div className="flex-1 w-full h-full bg-[#09090b] flex flex-col relative animate-in fade-in duration-300">
          
          {/* 에디터 헤더 */}
          <div className="flex items-center justify-between px-4 py-3 bg-[#09090b] border-b border-white/10 shrink-0 z-20">
            <button onClick={onBack} className="p-2 -ml-2 text-zinc-400 hover:text-white transition-colors"><ChevronLeft size={28}/></button>
            <div className="flex flex-col items-center">
              <span className="font-bold text-sm">{phase === 'result' ? '영상 완성' : '새 프로젝트'}</span>
            </div>
            <button 
              onClick={handleExport}
              disabled={phase !== 'result'}
              className={`px-4 py-1.5 rounded-full text-sm font-bold transition-all ${phase === 'result' ? 'bg-indigo-500 text-white shadow-lg shadow-indigo-500/30 active:scale-95' : 'bg-zinc-800 text-zinc-600'}`}
            >
              게시하기
            </button>
          </div>

          <div className="flex-1 overflow-y-auto scrollbar-hide relative flex flex-col">
            
            {/* ==========================================
                STEP 1: 무엇을 만들까? (입력 화면)
                ========================================== */}
            {phase === 'input' && (
              <div className="p-4 space-y-6 animate-in slide-in-from-bottom-4">
                {/* 1. 프롬프트/시나리오 입력 (선택사항) */}
                <div>
                  <label className="text-sm font-black text-white mb-2 block flex items-center justify-between">
                    어떤 영상을 만들까? 🎬 
                    <span className="text-[10px] text-zinc-500 font-normal bg-zinc-800 px-2 py-0.5 rounded-full">선택사항</span>
                  </label>
                  <div className="relative">
                    <textarea 
                      value={scenario}
                      onChange={(e)=>setScenario(e.target.value)}
                      placeholder="빈칸으로 두면 AI가 알아서 요즘 유행하는 트렌드 영상을 만들어드려요!"
                      className="w-full bg-zinc-900 border border-white/10 rounded-2xl p-4 text-sm focus:outline-none focus:border-pink-500 transition-colors resize-none h-32 placeholder:text-zinc-600 shadow-inner"
                    ></textarea>
                  </div>
                </div>

                {/* 2. 주인공 선택 (선택사항) */}
                <div className="space-y-3">
                   <label className="text-sm font-black text-white block flex items-center justify-between">
                     누가 나오게 할까? 👤
                     <span className="text-[10px] text-zinc-500 font-normal bg-zinc-800 px-2 py-0.5 rounded-full">선택사항</span>
                   </label>
                   
                   <div className="flex gap-2">
                      <input type="text" value={t2vPrompt} onChange={e=>setT2vPrompt(e.target.value)} placeholder="원하는 캐릭터 외형 묘사" className="flex-1 bg-zinc-900 border border-white/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-pink-500 transition-colors"/>
                   </div>
                   
                   <div className="flex items-center gap-3 px-2 py-2">
                     <div className="flex-1 h-px bg-white/10"></div>
                     <span className="text-[10px] text-zinc-600 font-bold">또는</span>
                     <div className="flex-1 h-px bg-white/10"></div>
                   </div>

                   <div className="w-full py-4 bg-zinc-900/50 border border-dashed border-zinc-700 rounded-xl flex items-center justify-center text-zinc-400 text-sm gap-2 active:bg-zinc-800 transition-colors cursor-pointer">
                      <Plus size={20} className="text-zinc-500" />
                      <span className="font-medium">내 갤러리에서 사진 고르기</span>
                   </div>
                </div>

                {/* 생성 버튼 (항상 활성화) */}
                <div className="pt-6">
                  <button 
                    onClick={handleStartGeneration}
                    className="w-full py-4 bg-gradient-to-r from-pink-600 to-indigo-600 rounded-2xl text-white font-black text-lg shadow-[0_4px_20px_rgba(236,72,153,0.4)] active:scale-95 transition-transform flex items-center justify-center gap-2"
                  >
                    <Sparkles size={24}/> 알아서 뚝딱 만들기
                  </button>
                </div>
              </div>
            )}

            {/* ==========================================
                STEP 2: 무지성 에디터 (결과 및 바이브 적용)
                ========================================== */}
            {phase === 'result' && (
              <div className="flex-1 flex flex-col animate-in zoom-in-95 duration-500 bg-[#09090b]">
                
                {/* 풀스크린 영상 프리뷰 */}
                <div className="relative w-full h-full bg-black overflow-hidden flex-1 flex flex-col justify-end shadow-[inset_0_0_100px_rgba(0,0,0,0.8)]">
                  <img src={DUMMY_IMG} className="absolute inset-0 w-full h-full object-cover opacity-90" />
                  <div className="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent pointer-events-none"></div>
                  
                  <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                     <div className="w-16 h-16 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center shadow-2xl">
                        <Play size={28} fill="white" className="ml-1" />
                     </div>
                  </div>

                  {/* 프롬프트 결과 정보 (작게 표시) */}
                  <div className="relative z-10 px-5 mb-4 pointer-events-none">
                    <div className="inline-flex bg-black/50 backdrop-blur-md px-3 py-1.5 rounded-lg border border-white/10">
                       <p className="text-[10px] font-medium text-zinc-300 line-clamp-2">
                         <span className="text-pink-400 font-bold">적용된 AI 프롬프트: </span>
                         {optimizedPrompt}
                       </p>
                    </div>
                  </div>

                  {/* Vibe 원터치 필터 (오디오/이펙트 통합) */}
                  <div className="relative z-10 w-full px-4 mb-8">
                    <p className="text-[11px] font-bold text-white mb-3 drop-shadow-md flex items-center gap-1.5"><Sparkles size={14} className="text-yellow-400"/> 원터치 바이브 (다시 렌더링)</p>
                    <div className="flex gap-2 overflow-x-auto scrollbar-hide pb-2 snap-x">
                      {vibes.map(vibe => (
                        <button 
                          key={vibe}
                          onClick={() => setSelectedVibe(prev => prev === vibe ? '' : vibe)}
                          className={`snap-start shrink-0 px-5 py-3 rounded-2xl text-sm font-black transition-all backdrop-blur-md border active:scale-95 ${selectedVibe === vibe ? 'bg-pink-600 text-white border-pink-400 shadow-[0_0_15px_rgba(236,72,153,0.5)]' : 'bg-black/60 text-zinc-300 border-white/20 hover:bg-black/80'}`}
                        >
                          {vibe}
                        </button>
                      ))}
                    </div>
                    
                    {/* 느낌 적용하기 버튼 (선택된 바이브가 있을 때만 노출) */}
                    {selectedVibe && (
                      <div className="mt-3 animate-in slide-in-from-bottom-2 fade-in">
                        <button 
                          onClick={handleApplyVibe}
                          className="w-full py-3.5 bg-gradient-to-r from-pink-600 to-indigo-600 rounded-xl text-white font-black text-sm shadow-[0_4px_20px_rgba(236,72,153,0.4)] active:scale-95 transition-transform flex items-center justify-center gap-2"
                        >
                          <Wand2 size={18}/> 느낌 적용해서 다시 만들기
                        </button>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}
          </div>
          
          {/* 공통 로딩 오버레이 (분석 중 / 생성 중 / 저장 중 분리) */}
          {(phase === 'analyzing' || phase === 'generating' || phase === 'saving') && (
            <div className="absolute inset-0 bg-black/95 z-[60] flex flex-col items-center justify-center animate-in fade-in">
               <Loader2 size={64} className="text-pink-500 animate-spin mb-6" />
               <h2 className="text-xl font-black mb-3 text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-indigo-400">
                 {phase === 'analyzing' ? '스토리보드 최적화 중...' : phase === 'generating' ? '영상을 뽑아보는 중! 🎲' : '보관함에 저장 중... 📥'}
               </h2>
               <p className="text-sm text-zinc-400 text-center leading-relaxed">
                 {phase === 'analyzing' 
                    ? '입력하신 정보(또는 트렌드)를 분석하여\n가장 멋진 연출을 기획하고 있습니다.' 
                    : phase === 'generating'
                    ? 'AI가 컷을 나누고 영상을 뚝딱 만들어냅니다.\n어떤 결과가 나올지 기대해주세요!'
                    : '완성된 영상을 내 작업함으로\n안전하게 옮기고 있습니다.'}
               </p>
            </div>
          )}
        </div>
      );
    };

    // --- 최상위 컨테이너 (실제 운영 시에는 이 App이 부모 앱이 됩니다) ---
    const App = () => {
      // 상위 앱에서 모듈의 종료/완료를 처리하는 콜백 함수들
      const handleCloseModule = () => {
        alert("모듈 종료: 부모 앱의 이전 화면으로 돌아갑니다.");
      };

      const handleCompleteModule = (data) => {
        alert("게시 완료!\n생성된 데이터: " + data.prompt + "\n부모 앱의 '보관함(내 작업함)'으로 라우팅됩니다.");
        // window.location.href = '/inbox'; 같은 라우팅 로직 처리
      };

      return (
        <div className="w-full h-full">
          {/* 분리된 생성 모듈을 바로 마운트합니다. */}
          <EditorModule onBack={handleCloseModule} onComplete={handleCompleteModule} />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
